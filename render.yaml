# Render Blueprint — Web service for the Express API (monorepo).
# Dashboard: New → Blueprint → connect repo, or attach this file when creating a Web Service manually.
# You still need a MySQL DATABASE_URL from PlanetScale, Railway, etc. (Render Postgres would require changing Prisma to postgresql).

services:
  - type: web
    name: lms-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_CROSS_SITE
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
